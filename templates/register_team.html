{% extends "base.html" %}
{% block content %}

<!-- FORM -->
<section class="form-page-section">
    <div class="form-shell">

        <div class="section-intro">
            <span class="section-kicker">Registration Form</span>
            <h2>Team Information</h2>
            <p>Please provide the official team and coach details below.</p>
        </div>

        <form method="POST" class="modern-form">

            <!-- TEAM INFO -->
            <div class="form-grid">

                <div class="form-group">
                    <label>Team Name</label>
                    <input type="text" name="team_name" required>
                </div>

                <div class="form-group">
                    <label>Coach Name</label>
                    <input type="text" name="coach_name" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select name="category" required>
                        <option value="">Select Category</option>
                        <option value="Boys">Boys</option>
                        <option value="Girls">Girls</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Age Group</label>
                    <input type="text" name="age_group" placeholder="e.g. U12, U14, U16" required>
                </div>

            </div>

            <!-- TEAM PLAYERS -->
            <div class="section-intro" style="margin-top:40px;">
                <span class="section-kicker">Team Players</span>
                <h2>Player Names</h2>
                <p>Enter the names of players in the team.</p>
            </div>

            <div class="form-grid">

                <div class="form-group">
                    <label>Player 1</label>
                    <input type="text" name="player_name[]">
                </div>

                <div class="form-group">
                    <label>Player 2</label>
                    <input type="text" name="player_name[]">
                </div>

                <div class="form-group">
                    <label>Player 3</label>
                    <input type="text" name="player_name[]">
                </div>

                <div class="form-group">
                    <label>Player 4</label>
                    <input type="text" name="player_name[]">
                </div>

                <div class="form-group">
                    <label>Player 5</label>
                    <input type="text" name="player_name[]">
                </div>

                <div class="form-group">
                    <label>Player 6</label>
                    <input type="text" name="player_name[]">
                </div>

                <div class="form-group">
                    <label>Player 7</label>
                    <input type="text" name="player_name[]">
                </div>

                <div class="form-group">
                    <label>Player 8</label>
                    <input type="text" name="player_name[]">
                </div>

                <div class="form-group">
                    <label>Player 9</label>
                    <input type="text" name="player_name[]">
                </div>

                <div class="form-group">
                    <label>Player 10</label>
                    <input type="text" name="player_name[]">
                </div>

                <div class="form-group">
                    <label>Player 11</label>
                    <input type="text" name="player_name[]">
                </div>

                <div class="form-group">
                    <label>Player 12</label>
                    <input type="text" name="player_name[]">
                </div>

            </div>

            <button type="submit" class="btn-primary form-submit-btn">
                Submit Team Registration
            </button>

        </form>

    </div>
</section>

{% endblock %}
