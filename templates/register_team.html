{% extends "base.html" %}
{% block content %}

<!-- FORM -->
<section class="form-page-section">
    <div class="form-shell">

        <div class="section-intro">
            <span class="section-kicker">Tournament Registration</span>
            <h2>Back-to-School Tournament</h2>
            <p>
                Register your team for the upcoming tournament.
                Maximum allowed players per team: 7.
            </p>
        </div>

        <form method="POST" class="modern-form">

            <!-- TEAM INFO -->
            <div class="form-grid">

                <div class="form-group">
                    <label>Team Name</label>
                    <input type="text" name="team_name" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select name="category" required>
                        <option value="">Select Category</option>
                        <option value="Boys">Boys</option>
                        <option value="Girls">Girls</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Age Group</label>
                    <input type="text"
                           name="age_group"
                           placeholder="e.g. U12, U14, U16"
                           required>
                </div>

            </div>

            <!-- PLAYERS -->
            <div class="players-section">

                <h3 class="players-title">Team Players</h3>
                <p class="players-note">
                    Enter up to 7 players only.
                </p>

                <div class="players-grid">

                    <div class="form-group">
                        <label>Player 1</label>
                        <input type="text" name="player1" required>
                    </div>

                    <div class="form-group">
                        <label>Player 2</label>
                        <input type="text" name="player2" required>
                    </div>

                    <div class="form-group">
                        <label>Player 3</label>
                        <input type="text" name="player3">
                    </div>

                    <div class="form-group">
                        <label>Player 4</label>
                        <input type="text" name="player4">
                    </div>

                    <div class="form-group">
                        <label>Player 5</label>
                        <input type="text" name="player5">
                    </div>

                    <div class="form-group">
                        <label>Player 6</label>
                        <input type="text" name="player6">
                    </div>

                    <div class="form-group">
                        <label>Player 7</label>
                        <input type="text" name="player7">
                    </div>

                </div>

            </div>

            <button type="submit" class="btn-primary form-submit-btn">
                Submit Tournament Registration
            </button>

        </form>

    </div>
</section>

{% endblock %}
